<!DOCTYPE html>
<html>
<head>
    <title>FrontDoor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
     <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f1117;
            color: #e6e6e6;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .card {
            background: #161a22;
            border: 1px solid #242a38;
            border-radius: 12px;
            padding: 14px 16px;
            transition: transform 0.1s ease, background 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            background: #1b2130;
        }

        a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }

        .name {
            font-weight: 500;
        }

        .hint {
            font-size: 12px;
            color: #8b93a7;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="container">
<h1>FrontDoor</h1>
<h3>Service Portal</h3>


  <h2>Apps</h2>
    <div class="grid">
        {{range .Services}}
        <div class="card">
            <a href="/go?name={{.Name}}" target="_blank">
                <div class="icon">⚙️</div>
                <div>
                    <div class="name">{{.Name}}</div>
                    <div class="hint">click to open</div>
                </div>
            </a>
        </div>
        {{end}}
    </div>

    <h2>SMB Shares</h2>

    
    <div class="grid">
        {{range .Shares}}
        <div class="card" onclick="copyShare(this)" data-info="{{.Instruction}}">
            <div class="name">📁 {{.Name}}</div>
            <div class="hint">{{.Info}}</div>
            <div class="hint">Click to copy instructions</div>
        </div>
        {{end}}
    </div>
    


</div>
</body>
</html>
<script>
function copyShare(el) {
    const text = el.getAttribute("data-info");

    // Modern API (HTTPS only)
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
            showCopied(el);
        }).catch(() => {
            fallbackCopy(text, el);
        });
    } else {
        fallbackCopy(text, el);
    }
}

function fallbackCopy(text, el) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";

    document.body.appendChild(textarea);
    textarea.select();

    try {
        document.execCommand("copy");
        showCopied(el);
    } catch (err) {
        console.error("Copy failed", err);
    }

    document.body.removeChild(textarea);
}

function showCopied(el) {
    const hint = el.querySelector(".hint");
    const old = hint.innerText;

    hint.innerText = "Copied ✔";

    setTimeout(() => {
        hint.innerText = old;
    }, 1200);
}
</script>
